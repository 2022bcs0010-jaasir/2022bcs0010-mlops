name: ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Configure AWS (Temporary Credentials)
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
        aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
        aws configure set default.region us-east-1

    - name: Pull DVC Data
      run: dvc pull

    - name: Train Model + MLflow
      run: python src/train.py

    - name: Upload MLflow Runs
      uses: actions/upload-artifact@v4
      with:
        name: mlruns
        path: mlruns/

    - name: Upload Metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics/metrics.json

    - name: Build Docker
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/2022bcs0010-mlops-assignment .

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker
      run: docker push ${{ secrets.DOCKER_USERNAME }}/2022bcs0010-mlops-assignment